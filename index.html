<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兔斯基的投资网站</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
.nav { background: #1e293b; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
.nav h1 { font-size: 20px; color: #3b82f6; }
.nav a { color: #94a3b8; text-decoration: none; margin-left: 20px; font-size: 14px; cursor: pointer; }
.nav a:hover { color: #3b82f6; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.stat-card .num { font-size: 28px; font-weight: 700; }
.stat-card .label { font-size: 14px; color: #94a3b8; margin-top: 4px; }
.green { color: #22c55e; }
.blue { color: #3b82f6; }
.yellow { color: #eab308; }
.red { color: #ef4444; }
h2 { font-size: 18px; margin-bottom: 16px; }
.btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.btn:hover { background: #2563eb; }
.btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; }
.card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; margin-bottom: 16px; }
.card h3 { font-size: 16px; margin-bottom: 8px; }
.card p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.badge-green { background: #166534; color: #22c55e; }
.badge-red { background: #7f1d1d; color: #ef4444; }
.badge-yellow { background: #713f12; color: #eab308; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
th { color: #94a3b8; font-weight: 600; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }
.section { display: none; }
.section.active { display: block; }
.empty { text-align: center; padding: 60px 20px; color: #64748b; }
.empty p { font-size: 16px; margin-top: 12px; }
.dim-section { margin-bottom: 12px; padding: 14px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
.dim-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.dim-title { font-size: 14px; font-weight: 600; }
.dim-total { font-size: 14px; font-weight: 700; color: #3b82f6; }
.dim-indicators { display: none; padding: 12px 0 0 0; margin-top: 12px; border-top: 1px solid #334155; }
.dim-indicators.open { display: block; }
.indicator-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.indicator-name { font-size: 12px; color: #94a3b8; flex: 1; }
.indicator-score { width: 36px; text-align: center; font-weight: 600; color: #3b82f6; }
.indicator-slider { flex: 2; }
.indicator-slider input { width: 100%; accent-color: #3b82f6; }
.indicator-desc { font-size: 11px; color: #64748b; margin-bottom: 8px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
.toast.error { background: #ef4444; }
.compare-grid { display: grid; gap: 12px; }
.compare-card { background: #1e293b; border-radius: 12px; padding: 16px; border: 2px solid #334155; }
.compare-card.winner { border-color: #22c55e; }
.compare-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
.compare-row:last-child { border-bottom: none; }
.compare-label { color: #94a3b8; font-size: 13px; }
.compare-value { font-weight: 600; font-size: 13px; }
.compare-select-wrap { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.compare-select-wrap select { padding: 8px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 13px; min-width: 150px; }
</style>
</head>
<body>

<div class="nav">
  <h1>🐻 兔斯基投资</h1>
  <div>
    <a href="#" onclick="show('dashboard')">首页</a>
    <a href="#" onclick="show('projects')">项目库</a>
    <a href="#" onclick="show('compare')">项目对比</a>
    <a href="#" onclick="show('new-project')">新建评估</a>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="container">
  <div id="dashboard" class="section active">
    <h2>📊 投资仪表盘</h2>
    <div class="stats" id="stats"></div>
    <div class="grid-2">
      <div>
        <h2>📋 最近项目</h2>
        <div id="recent-projects"></div>
      </div>
      <div>
        <h2>📈 行业分布</h2>
        <div class="card" id="distribution"><p style="color:#64748b">暂无数据</p></div>
      </div>
    </div>
  </div>

  <div id="projects" class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h2>📁 项目库 (<span id="project-count">0</span>)</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input type="text" id="search-input" placeholder="搜索..." oninput="renderProjects()" style="padding:8px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;width:140px;">
        <select id="stage-filter" onchange="renderProjects()" style="padding:8px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;">
          <option value="">全部阶段</option>
          <option value="概念阶段">概念阶段</option>
          <option value="种子轮">种子轮</option>
          <option value="天使轮">天使轮</option>
          <option value="Pre-A">Pre-A</option>
          <option value="A轮">A轮</option>
          <option value="B轮">B轮</option>
          <option value="C轮及以上">C轮及以上</option>
          <option value="战略融资">战略融资</option>
        </select>
      </div>
    </div>
    <div id="project-list"></div>
  </div>

  <div id="compare" class="section">
    <h2>📊 项目对比分析</h2>
    <div class="compare-select-wrap">
      <select id="c1" onchange="renderCompare()"><option value="">选择项目1</option></select>
      <select id="c2" onchange="renderCompare()"><option value="">选择项目2</option></select>
      <select id="c3" onchange="renderCompare()"><option value="">选择项目3</option></select>
    </div>
    <div id="compare-result"></div>
  </div>

  <div id="new-project" class="section">
    <h2>📝 新建项目评估</h2>
    <div class="grid-2">
      <div>
        <div class="card">
          <h3>基本信息</h3>
          <div class="form-group"><label>项目名称 *</label><input type="text" id="p-name" placeholder="请输入项目名称"></div>
          <div class="form-group"><label>公司名称</label><input type="text" id="p-company" placeholder="请输入公司名称"></div>
          <div class="form-group"><label>行业</label>
            <select id="p-industry">
              <option value="AI芯片">AI芯片</option>
              <option value="大模型">大模型</option>
              <option value="AI应用">AI应用</option>
              <option value="机器人">机器人/具身智能</option>
              <option value="太空AI">太空AI算力</option>
              <option value="卫星互联网">卫星互联网</option>
              <option value="量子计算">量子计算</option>
              <option value="商业航天">商业航天</option>
              <option value="新能源">新能源/储能</option>
              <option value="半导体">半导体</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group"><label>融资阶段</label>
            <select id="p-stage">
              <option value="概念阶段">概念阶段</option>
              <option value="种子轮">种子轮</option>
              <option value="天使轮">天使轮</option>
              <option value="Pre-A">Pre-A</option>
              <option value="A轮">A轮</option>
              <option value="B轮">B轮</option>
              <option value="C轮及以上">C轮及以上</option>
              <option value="战略融资">战略融资</option>
            </select>
          </div>
          <div class="form-group"><label>项目简介</label><textarea id="p-desc" rows="3" placeholder="一句话描述项目..."></textarea></div>
          <div class="form-group"><label>备注</label><textarea id="p-notes" rows="3" placeholder="其他备注..."></textarea></div>
        </div>
      </div>
      <div>
        <div class="card">
          <h3>🎯 8维度细化评估</h3>
          <p style="font-size:12px;color:#64748b;margin-bottom:12px;">点击维度展开，为子类别独立打分</p>
          <div id="dimension-details"></div>
          <div style="margin-top:16px;padding:16px;background:#0f172a;border-radius:8px;text-align:center;">
            <div style="font-size:14px;color:#94a3b8;">加权总分（百分制）</div>
            <div id="total-score" style="font-size:48px;font-weight:700;margin:8px 0;">0</div>
            <div id="investment-advice" style="font-size:16px;font-weight:600;"></div>
          </div>
          <button class="btn" style="width:100%;margin-top:16px;padding:12px;" onclick="saveProject()">💾 保存项目</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============ 配置 ============
const CLOUDBASE = {
  env: 'my-cloudbase-investment-4cf8cf76',
  appId: '1308716099'
};

// ============ 维度配置 ============
const DIMS = [
  { id: 'technology', name: '技术维度', weight: 16, color: '#3b82f6', inds: ['技术成熟度','技术创新度','技术壁垒','替代风险'] },
  { id: 'product', name: '产品维度', weight: 15, color: '#8b5cf6', inds: ['PMF契合度','产品竞争力','迭代能力','商业化潜力'] },
  { id: 'market', name: '市场维度', weight: 15, color: '#22c55e', inds: ['市场规模','增长预期','政策支持','进入壁垒'] },
  { id: 'competition', name: '竞争维度', weight: 12, color: '#f97316', inds: ['竞争格局','对手实力','差异化','份额潜力'] },
  { id: 'team', name: '团队维度', weight: 12, color: '#ec4899', inds: ['创始人背景','团队完整性','执行力','学习能力'] },
  { id: 'organization', name: '组织维度', weight: 10, color: '#14b8a6', inds: ['组织架构','企业文化','人才吸引','管理体系'] },
  { id: 'financing', name: '融资周期', weight: 10, color: '#eab308', inds: ['融资节奏','资本耐心','资金储备','烧钱率'] },
  { id: 'exit', name: '退出路径', weight: 10, color: '#6366f1', inds: ['IPO可能性','并购可能性','流动性','基金匹配'] }
];

let projects = [];
let scores = {};
let expanded = {};

DIMS.forEach(d => {
  scores[d.id] = new Array(4).fill(5);
  expanded[d.id] = false;
});

// ============ 本地存储 ============
const STORAGE_KEY = 'tuqii_projects_v2';

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}

function loadFromStorage() {
  const s = localStorage.getItem(STORAGE_KEY);
  projects = s ? JSON.parse(s) : [];
}

// ============ 初始化 ============
function init() {
  loadFromStorage();
  renderDashboard();
  renderProjects();
  renderCompareSelect();
  initDims();
}

function initDims() {
  const el = document.getElementById('dimension-details');
  el.innerHTML = DIMS.map(d => `
    <div class="dim-section">
      <div class="dim-header" onclick="toggleDim('${d.id}')">
        <span class="dim-title" style="color:${d.color}">${d.name} (${d.weight}%)</span>
        <span class="dim-total" id="dt-${d.id}">5分</span>
      </div>
      <div class="dim-indicators ${expanded[d.id] ? 'open' : ''}" id="di-${d.id}">
        ${d.inds.map((name, i) => `
          <div class="indicator-row">
            <span class="indicator-name">${name}</span>
            <span class="indicator-score" id="s-${d.id}-${i}">${scores[d.id][i]}</span>
            <div class="indicator-slider">
              <input type="range" min="1" max="10" value="${scores[d.id][i]}" 
                oninput="onScore('${d.id}',${i},this.value)" style="accent-color:${d.color}">
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  updateTotal();
}

function toggleDim(id) {
  expanded[id] = !expanded[id];
  document.getElementById('di-' + id).classList.toggle('open');
}

function onScore(dimId, idx, val) {
  scores[dimId][idx] = parseInt(val);
  document.getElementById('s-' + dimId + '-' + idx).textContent = val;
  const avg = Math.round(scores[dimId].reduce((a,b)=>a+b,0)/4);
  document.getElementById('dt-' + dimId).textContent = avg + '分';
  updateTotal();
}

function getDimAvg(dimId) {
  return Math.round(scores[dimId].reduce((a,b)=>a+b,0)/4);
}

function updateTotal() {
  let total = 0;
  DIMS.forEach(d => { total += getDimAvg(d.id) * d.weight; });
  const el = document.getElementById('total-score');
  const adv = document.getElementById('investment-advice');
  el.textContent = total;
  el.style.color = total >= 70 ? '#22c55e' : total >= 50 ? '#eab308' : '#ef4444';
  if (total >= 90) { adv.textContent = '🟢 强烈推荐投资'; adv.style.color = '#22c55e'; }
  else if (total >= 70) { adv.textContent = '🟡 推荐投资'; adv.style.color = '#eab308'; }
  else if (total >= 50) { adv.textContent = '🟠 观望'; adv.style.color = '#eab308'; }
  else { adv.textContent = '🔴 不建议投资'; adv.style.color = '#ef4444'; }
}

// ============ 保存项目 ============
function saveProject() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) { showToast('请输入项目名称', true); return; }
  
  const dimTotals = {};
  DIMS.forEach(d => { dimTotals[d.id] = getDimAvg(d.id); });
  
  let total = 0;
  DIMS.forEach(d => { total += dimTotals[d.id] * d.weight; });
  
  const project = {
    id: Date.now().toString(),
    name,
    company: document.getElementById('p-company').value.trim(),
    industry: document.getElementById('p-industry').value,
    stage: document.getElementById('p-stage').value,
    description: document.getElementById('p-desc').value.trim(),
    notes: document.getElementById('p-notes').value.trim(),
    scores: JSON.parse(JSON.stringify(scores)),
    dimTotals,
    totalScore: total,
    advice: total >= 90 ? '强烈推荐投资' : total >= 70 ? '推荐投资' : total >= 50 ? '观望' : '不建议投资',
    createdAt: new Date().toISOString()
  };
  
  projects.unshift(project);
  saveToStorage();
  showToast('✅ 已保存到云端！');
  
  // Reset
  document.getElementById('p-name').value = '';
  document.getElementById('p-company').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-notes').value = '';
  DIMS.forEach(d => { scores[d.id] = new Array(4).fill(5); });
  initDims();
  
  renderDashboard();
  renderProjects();
  renderCompareSelect();
}

// ============ 渲染 ============
function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'projects') renderProjects();
  if (id === 'compare') { renderCompareSelect(); renderCompare(); }
  if (id === 'new-project') initDims();
}

function renderDashboard() {
  const total = projects.length;
  const invested = projects.filter(p => p.totalScore >= 70).length;
  const rejected = projects.filter(p => p.totalScore < 70).length;
  const avg = total > 0 ? Math.round(projects.reduce((s,p) => s + (p.totalScore||0), 0) / total) : 0;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num blue">${total}</div><div class="label">总项目数</div></div>
    <div class="stat-card"><div class="num green">${invested}</div><div class="label">推荐投资</div></div>
    <div class="stat-card"><div class="num red">${rejected}</div><div class="label">不建议</div></div>
    <div class="stat-card"><div class="num yellow">${avg}</div><div class="label">平均分</div></div>
  `;

  const rp = document.getElementById('recent-projects');
  if (projects.length === 0) {
    rp.innerHTML = '<div class="empty"><p>暂无项目</p><p style="font-size:13px;">点击"新建评估"开始</p></div>';
  } else {
    rp.innerHTML = projects.slice(0,5).map(p => `
      <div class="card" style="cursor:pointer;" onclick="viewProject('${p.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div><h3>${p.name}</h3><p style="font-size:12px;color:#64748b;margin-top:2px;">${p.company || '未知'} · ${p.industry} · ${p.stage}</p></div>
          <div style="text-align:right;">
            <div style="font-size:24px;font-weight:700;color:${p.totalScore>=70?'#22c55e':'#ef4444'}">${p.totalScore}</div>
            <span class="badge ${p.totalScore>=90?'badge-green':p.totalScore>=70?'badge-yellow':'badge-red'}">${p.advice}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  const dist = document.getElementById('distribution');
  if (total > 0) {
    const inds = {};
    projects.forEach(p => { inds[p.industry] = (inds[p.industry]||0) + 1; });
    dist.innerHTML = Object.entries(inds).sort((a,b)=>b[1]-a[1]).map(([ind,count]) => `
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span style="font-size:13px;">${ind}</span>
        <span style="font-size:13px;font-weight:600;">${count}个</span>
      </div>
    `).join('');
  }
}

function renderProjects() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const stage = document.getElementById('stage-filter').value;
  const filtered = projects.filter(p => {
    const matchS = !search || p.name.toLowerCase().includes(search) || (p.company||'').toLowerCase().includes(search);
    const matchSt = !stage || p.stage === stage;
    return matchS && matchSt;
  });

  document.getElementById('project-count').textContent = filtered.length;
  const el = document.getElementById('project-list');
  
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty"><p>暂无项目</p></div>';
    return;
  }
  
  el.innerHTML = `<table><thead><tr><th>项目</th><th>行业</th><th>阶段</th><th>分数</th><th>建议</th></tr></thead><tbody>
    ${filtered.map(p => `
      <tr style="cursor:pointer" onclick="viewProject('${p.id}')">
        <td><strong>${p.name}</strong><br><span style="font-size:12px;color:#64748b">${p.company||''}</span></td>
        <td>${p.industry}</td>
        <td>${p.stage}</td>
        <td style="font-weight:700;color:${p.totalScore>=70?'#22c55e':'#ef4444'}">${p.totalScore}</td>
        <td><span class="badge ${p.totalScore>=90?'badge-green':p.totalScore>=70?'badge-yellow':'badge-red'}">${p.advice}</span></td>
      </tr>
    `).join('')}</tbody></table>`;
}

function renderCompareSelect() {
  ['c1','c2','c3'].forEach(cid => {
    const sel = document.getElementById(cid);
    sel.innerHTML = '<option value="">选择项目</option>' + projects.map(p => 
      `<option value="${p.id}">${p.name}</option>`
    ).join('');
  });
}

function renderCompare() {
  const ids = ['c1','c2','c3'].map(cid => document.getElementById(cid).value).filter(Boolean);
  const selected = ids.map(id => projects.find(p => p.id === id)).filter(Boolean);
  
  const el = document.getElementById('compare-result');
  if (selected.length < 2) {
    el.innerHTML = '<p style="color:#64748b;text-align:center;padding:40px;">请至少选择2个项目进行对比</p>';
    return;
  }

  const maxScore = Math.max(...selected.map(p => p.totalScore));
  
  el.innerHTML = `<div class="compare-grid" style="grid-template-columns:repeat(${selected.length},1fr)">
    ${selected.map(p => `
      <div class="compare-card ${p.totalScore===maxScore&&selected.length>1?'winner':''}">
        <h3 style="margin-bottom:12px;">${p.name}</h3>
        <div style="font-size:32px;font-weight:700;color:${p.totalScore>=70?'#22c55e':'#ef4444'};margin-bottom:8px;">${p.totalScore}</div>
        <span class="badge ${p.totalScore>=90?'badge-green':p.totalScore>=70?'badge-yellow':'badge-red'}" style="margin-bottom:16px;display:inline-block;">${p.advice}</span>
        <div class="compare-row"><span class="compare-label">行业</span><span class="compare-value">${p.industry}</span></div>
        <div class="compare-row"><span class="compare-label">阶段</span><span class="compare-value">${p.stage}</span></div>
        ${DIMS.map(d => `
          <div class="compare-row">
            <span class="compare-label">${d.name}</span>
            <span class="compare-value" style="color:${d.color}">${p.dimTotals?.[d.id]||0}分</span>
          </div>
        `).join('')}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #334155;">
          <button class="btn" style="width:100%;padding:8px;font-size:12px;" onclick="deleteProject('${p.id}')">🗑️ 删除</button>
        </div>
      </div>
    `).join('')}
  </div>`;
}

function viewProject(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('new-project').classList.add('active');
  
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-company').value = p.company || '';
  document.getElementById('p-industry').value = p.industry;
  document.getElementById('p-stage').value = p.stage;
  document.getElementById('p-desc').value = p.description || '';
  document.getElementById('p-notes').value = p.notes || '';
  
  if (p.scores) {
    DIMS.forEach(d => {
      if (p.scores[d.id]) {
        scores[d.id] = [...p.scores[d.id]];
      }
    });
  }
  initDims();
}

function deleteProject(id) {
  if (!confirm('确定删除此项目？')) return;
  projects = projects.filter(p => p.id !== id);
  saveToStorage();
  renderDashboard();
  renderProjects();
  renderCompareSelect();
  renderCompare();
  showToast('已删除');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
